<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a1628">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="薛之谦专属音乐播放器 — 一站式收听薛之谦正版歌曲">
  <title>薛之谦 — 音乐播放器</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
</head>
<body>

  <!-- 背景光晕 -->
  <div class="bg-ambient">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
  </div>

  <!-- ==================== 顶部导航 ==================== -->
  <header class="header">
    <div class="header-brand">
      <span class="header-icon">🎵</span>
      <div>
        <span class="header-title">薛之谦</span>
        <span class="header-subtitle">Joker Xue Music Player</span>
      </div>
    </div>
    <div class="header-actions">
      <span class="header-count">
        曲库 <strong id="totalCount">—</strong> 首
      </span>
    </div>
  </header>

  <!-- ==================== Tab 导航 ==================== -->
  <nav class="tabs">
    <div class="tab active" data-view="player">
      <span class="tab-icon">🎧</span>
      <span class="tab-label">正在播放</span>
    </div>
    <div class="tab" data-view="playlist">
      <span class="tab-icon">📋</span>
      <span class="tab-label">歌单</span>
      <span class="tab-count"></span>
    </div>
    <div class="tab" data-view="favorites">
      <span class="tab-icon">❤️</span>
      <span class="tab-label">收藏</span>
      <span class="tab-count">0</span>
    </div>
  </nav>

  <!-- ==================== 主内容区 ==================== -->
  <main class="main-content">

    <!-- 正在播放视图 -->
    <div class="view active" id="playerView">
      <div class="player-hero">
        <!-- 唱片封面 + 光晕环 -->
        <div class="cover-wrapper">
          <div class="cover-glow"></div>
          <div class="cover-container" id="coverContainer">
            <div class="cover-placeholder cover-disc">
              <div class="cover-inner">
                <span class="cover-emoji">🎵</span>
                <span class="cover-text">薛之谦</span>
              </div>
            </div>
          </div>
          <div class="cover-ring"></div>
        </div>

        <!-- 歌曲信息 -->
        <div class="song-info glass-card">
          <div class="song-title" id="songTitle">薛之谦</div>
          <div class="song-artist">薛之谦</div>
          <div class="song-album" id="songAlbum">点击下方歌单开始收听</div>
        </div>

        <!-- 进度条 -->
        <div class="progress-area">
          <div class="progress-bar-custom">
            <div class="progress-fill" id="progressFill"></div>
            <div class="progress-thumb" id="progressThumb"></div>
            <input type="range" class="progress-bar" id="progressBar" min="0" max="100" value="0" step="0.1">
          </div>
          <div class="progress-time">
            <span id="currentTime">0:00</span>
            <span id="totalTime">0:00</span>
          </div>
        </div>

        <!-- 播放控制 -->
        <div class="player-controls">
          <button class="btn-mode" id="btnMode" title="播放模式">🔁</button>
          <button class="btn-control btn-prev" id="btnPrev" title="上一首">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
          </button>
          <button class="btn-play" id="btnPlay" title="播放/暂停">
            <svg class="icon-play" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            <svg class="icon-pause" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          </button>
          <button class="btn-control btn-next" id="btnNext" title="下一首">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
          </button>
          <button class="btn-action" id="btnLike" title="收藏">
            <svg class="icon-heart" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            <span>收藏</span>
          </button>
        </div>
      </div>

      <!-- 歌词滚动 -->
      <div class="lyrics-wrapper glass-card">
        <div class="lyrics-container" id="lyricsContainer">
          <div class="lyrics-empty">🎤 选择歌曲后歌词将显示在这里</div>
        </div>
      </div>
    </div>

    <!-- 歌单视图 -->
    <div class="view" id="playlistView">
      <div class="search-box">
        <svg class="search-icon-svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" class="search-input" id="searchInput" placeholder="搜索歌曲或专辑...">
      </div>
      <div class="playlist-inner" id="playlistInner">
        <!-- JS 渲染 -->
      </div>
    </div>

    <!-- 收藏视图 -->
    <div class="view" id="favoritesView">
      <div class="favorites-empty">
        <div class="favorites-empty-icon">💿</div>
        <div class="favorites-empty-text">收藏列表为空</div>
        <div class="favorites-empty-hint">在歌曲列表中点击 ♡ 即可收藏</div>
      </div>
    </div>

  </main>

  <!-- ==================== 底部播放栏 ==================== -->
  <div class="player-bar hidden" id="playerBar">
    <div class="player-bar-progress">
      <div class="player-bar-progress-inner" id="barProgress" style="width:0%"></div>
    </div>
    <div class="player-bar-inner">
      <div class="player-bar-mini-cover-wrap">
        <img class="player-bar-mini-cover" id="barCover" src="" alt="">
      </div>
      <div class="player-bar-info" id="barInfo">
        <div class="player-bar-title" id="barTitle">未在播放</div>
        <div class="player-bar-artist">薛之谦</div>
      </div>
      <div class="player-bar-actions">
        <button class="player-bar-btn play-btn" id="barPlayBtn">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- ==================== Toast 提示 ==================== -->
  <div class="toast" id="toast"></div>

  <!-- ==================== 脚本 ==================== -->
  <script src="js/app.js"></script>
  <script>
    document.getElementById('totalCount').textContent = (typeof SONGS !== 'undefined') ? SONGS.length : '—';
  </script>

</body>
</html>
